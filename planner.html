<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css-files/stylePlanner.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap">
    <script defer src="script.js"></script>
    <title>Fitnesser</title>
    <link rel="icon" href="img/logo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>

</head>

<script>
    animations = false
</script>

<body>
    <p><a href="index.html" style="color: black; text-decoration: none;">Fitnesser by GlitchKittyy</a></p>
    <h1 id="VERANDER" style="line-height: 0%;">Workout Tools</h1>
    <br><br>
    <section id="choice" class="hidden">
        <button onclick="showGenerator()">
            <img src="img/dumbell_icon.png" alt="dumbell">
            Schedule Generator
        </button>
        <br>
        <button onclick="naar()">
            <img src="img/spinner.png" alt="dumbell">
            Workout Selector 
        </button>
    </section>

    
    
    <section id="checklist" style="display: none;" class="hidden">
        <h2>Workout Checklist</h2>
        <form id="workoutForm">
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Arms"> Arms
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Legs"> Legs
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Shoulders"> Shoulders
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Back"> Back
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Core"> Core
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Chest"> Chest
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Full Body"> Full Body
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Glutes"> Glutes
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Cardio"> Cardio
            </label>

        </form>
        <br>
        <div id="savedWorkouts">
            <button onclick="generateSchedule()">Generate Schedule</button>
            <br>
        </div>
    </section>
    <section id="generator" style="display: none;">
        <h2>Generated schedule</h2>
        <p id="workout"></p>
        <p>Fitnesser - GlitchKittyy</p>
    </section>
    <br>
    <div class="downloader">
        <button style="display: none;"id="download" onclick="capture()">Download as .JPEG</button>
        <br><br>
        <p id="meer" style="display: none">Want to customise rest-days?</p>
        <button id="meerKnop"style="display: none;" onclick="window.location.href = 'helaas.html'">Click here!</button>
    </div>
    <br><br><br><br><br><br><br><br><br><br><br>
    
</body>

</html>
