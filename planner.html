    <p>Fitnesser by GlitchKittyy</p>
    <h1 style="line-height: 0%;">Planner</h1>
    <br><br>
    <section id="choice" class="hidden">
        <button onclick="showGenerator()">Genereer een workout planning</button>
        <br>
    </section>

    
    
    <section id="checklist" style="display: none;" class="hidden">
        <h2>Workout Checklist</h2>
        <form id="workoutForm">
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Armen"> Armen
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Benen"> Benen
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Schouders"> Schouders
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Rug"> Rug
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Buik"> Buik
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Borst"> Borst
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Full Body"> Full Body
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Onderlichaam"> Onderlichaam
            </label>
            <label class="custom-checkbox">
                <input type="checkbox" name="workout" value="Cardio"> Cardio
            </label>

        </form>
        <br>
        <div id="savedWorkouts">
            <button onclick="generateSchedule()">Genereer Schema</button>
            <br>
        </div>
    </section>
    <section id="generator" style="display: none;">
        <h2>Gegenereerd Schema</h2>
        <p id="workout"></p>
        <p>Fitnesser - GlitchKittyy</p>
    </section>
